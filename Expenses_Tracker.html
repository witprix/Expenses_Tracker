<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault Pro: Pure Metrics & Copy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .active-tab { background-color: white; color: #4f46e5; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .edit-glow { border: 2px solid #4f46e5 !important; box-shadow: 0 0 15px rgba(79, 102, 241, 0.2); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e4e4e7; border-radius: 10px; }
        .copy-toast { animation: fadeOut 2s forwards; }
        @keyframes fadeOut { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900 min-h-screen pb-20">

    <div class="sticky top-0 z-50 bg-zinc-900 p-4 shadow-lg md:px-10 flex justify-between items-center text-white">
        <h1 class="font-black tracking-tighter text-xl text-white uppercase">Vault <span class="text-indigo-500">Pro</span></h1>
        <div id="date-display" class="text-[10px] font-bold opacity-60 uppercase tracking-[0.2em]">Utility & Travel Manager</div>
    </div>

    <div id="toast-container" class="fixed top-20 left-1/2 -translate-x-1/2 z-[100] pointer-events-none"></div>

    <div class="max-w-6xl mx-auto p-4">
        <div class="bg-zinc-200/50 p-1 rounded-2xl flex mb-6 max-w-md mx-auto border border-zinc-200">
            <button onclick="switchTab('utility')" id="tab-btn-utility" class="flex-1 py-3 rounded-xl font-bold transition-all active-tab text-xs uppercase tracking-wider">Utilities</button>
            <button onclick="switchTab('travel')" id="tab-btn-travel" class="flex-1 py-3 rounded-xl font-bold transition-all text-zinc-500 text-xs uppercase tracking-wider">Travel</button>
        </div>

        <div id="summary-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-8"></div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-5 space-y-6">
                
                <section id="pane-utility" class="bg-white p-6 rounded-3xl border border-zinc-200 shadow-sm transition-all">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-black text-zinc-400 uppercase text-[10px] tracking-widest">Utility Entry</h2>
                        <div class="flex gap-3">
                            <button onclick="handleManualExport('utility')" class="text-[10px] font-black text-indigo-600 hover:underline transition">EXPORT / SYNC</button>
                            <button onclick="triggerImport('utility')" class="text-[10px] font-black text-zinc-400 hover:text-indigo-600 transition">IMPORT</button>
                        </div>
                    </div>
                    <form id="uForm" class="space-y-3">
                        <input type="hidden" id="u-id">
                        <select id="u-cat" onchange="toggleUFields()" class="w-full p-3 bg-zinc-50 rounded-xl border border-zinc-200 outline-none font-semibold text-sm">
                            <option value="Mobile">📱 Mobile</option>
                            <option value="Electricity">⚡ Electricity</option>
                            <option value="Petrol">⛽ Petrol</option>
                            <option value="Gas">🔥 Gas</option>
                            <option value="Broadband">🌐 Broadband</option>
                        </select>

                        <div class="bg-zinc-50 p-3 rounded-2xl border border-zinc-200/60 space-y-2">
                            <label class="text-[9px] font-black text-zinc-400 uppercase block px-1">Billing Period</label>
                            <div class="grid grid-cols-2 gap-2 text-xs">
                                <div>
                                    <span class="text-[8px] font-bold text-zinc-400 block mb-1">FROM</span>
                                    <input type="date" id="u-bill-from" class="w-full p-2 bg-white rounded-lg border border-zinc-200 outline-none text-xs">
                                </div>
                                <div>
                                    <span class="text-[8px] font-bold text-zinc-400 block mb-1">TO</span>
                                    <input type="date" id="u-bill-to" class="w-full p-2 bg-white rounded-lg border border-zinc-200 outline-none text-xs">
                                </div>
                            </div>
                        </div>
                        
                        <div>
                            <label id="u-acc-label" class="hidden text-[9px] font-black text-zinc-400 uppercase block px-1 mb-1">Account ID</label>
                            <input type="text" id="u-acc" placeholder="Account / Phone / Meter No" class="w-full p-3 bg-zinc-50 rounded-xl border border-zinc-200 outline-none text-sm">
                        </div>
                        
                        <div id="u-elec-group" class="hidden space-y-3">
                            <select id="u-city" onchange="handleCityChange()" class="w-full p-3 bg-zinc-50 rounded-xl border border-zinc-200 outline-none text-sm font-semibold">
                                <option value="">Select City</option>
                                <option value="Kadapa">Kadapa</option>
                                <option value="Bangalore">Bangalore</option>
                            </select>

                            <div id="u-blr-fields" class="hidden space-y-3 bg-zinc-50 p-3 rounded-2xl border border-zinc-200/60">
                                <div class="grid grid-cols-2 gap-2 text-xs">
                                    <div>
                                        <label class="text-[9px] font-black text-zinc-400 uppercase block px-1">RR Number</label>
                                        <input type="text" id="u-blr-rr" value="MSVNL31161" readonly class="w-full p-2 bg-zinc-200/60 rounded-lg border border-zinc-200 font-semibold text-zinc-600 outline-none cursor-not-allowed">
                                    </div>
                                    <div>
                                        <label class="text-[9px] font-black text-zinc-400 uppercase block px-1">MR Code</label>
                                        <input type="text" id="u-blr-mr" value="1126130" readonly class="w-full p-2 bg-zinc-200/60 rounded-lg border border-zinc-200 font-semibold text-zinc-600 outline-none cursor-not-allowed">
                                    </div>
                                </div>
                                <div class="grid grid-cols-2 gap-2 text-xs">
                                    <div>
                                        <label class="text-[9px] font-black text-zinc-400 uppercase block px-1">Sanctioned Load</label>
                                        <input type="text" id="u-blr-load" value="5 kW" readonly class="w-full p-2 bg-zinc-200/60 rounded-lg border border-zinc-200 font-semibold text-zinc-600 outline-none cursor-not-allowed">
                                    </div>
                                    <div>
                                        <label class="text-[9px] font-black text-zinc-400 uppercase block px-1">Fixed Charges</label>
                                        <input type="text" id="u-blr-fixed" value="₹725" readonly class="w-full p-2 bg-zinc-200/60 rounded-lg border border-zinc-200 font-semibold text-zinc-600 outline-none cursor-not-allowed">
                                    </div>
                                </div>
                                <div>
                                    <label class="text-[9px] font-black text-zinc-400 uppercase block px-1">GoK Subsidy (₹)</label>
                                    <input type="number" id="u-blr-subsidy" step="0.01" placeholder="Enter Government Subsidy Amount" class="w-full p-2.5 bg-white rounded-xl border border-zinc-200 outline-none">
                                </div>
                            </div>

                            <input type="number" id="u-units" placeholder="Units Consumed (kWh)" class="w-full p-3 bg-zinc-50 rounded-xl border border-zinc-200 outline-none text-sm">
                        </div>

                        <div id="u-fuel-group" class="hidden grid grid-cols-2 gap-2">
                            <input type="number" id="u-liters" step="0.01" placeholder="Liters" class="p-3 bg-zinc-50 rounded-xl border border-zinc-200 outline-none text-sm">
                            <input type="number" id="u-price" step="0.01" placeholder="₹/L" class="p-3 bg-zinc-50 rounded-xl border border-zinc-200 outline-none text-sm">
                        </div>

                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" id="u-amt" required placeholder="Base ₹" class="p-3 bg-zinc-50 rounded-xl border border-zinc-200 outline-none text-sm">
                            <input type="text" id="u-disc" placeholder="Disc (₹ or %)" class="p-3 bg-zinc-50 rounded-xl border border-zinc-200 outline-none text-sm">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-zinc-400 uppercase px-1">Attach Invoice</label>
                            <input type="file" id="u-file" accept="image/*,application/pdf" class="w-full text-xs text-zinc-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-black file:bg-zinc-100 file:text-zinc-700">
                        </div>
                        <input type="date" id="u-date" class="w-full p-3 bg-zinc-50 rounded-xl border border-zinc-200 outline-none text-sm">
                        <button type="submit" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-700 transition-all uppercase tracking-widest text-[11px]">Save Utility</button>
                    </form>
                </section>

                <section id="pane-travel" class="hidden bg-white p-6 rounded-3xl border border-zinc-200 shadow-sm transition-all">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-black text-zinc-400 uppercase text-[10px] tracking-widest">Travel Entry</h2>
                        <div class="flex gap-3">
                            <button onclick="handleManualExport('travel')" class="text-[10px] font-black text-emerald-600 hover:underline transition">EXPORT / SYNC</button>
                            <button onclick="triggerImport('travel')" class="text-[10px] font-black text-zinc-400 hover:text-emerald-600 transition">IMPORT</button>
                        </div>
                    </div>
                    <form id="tForm" class="space-y-3">
                        <input type="hidden" id="t-id">
                        <select id="t-cat" class="w-full p-3 bg-zinc-50 rounded-xl border border-zinc-200 outline-none font-semibold text-sm">
                            <option value="Flight">✈️ Flight</option>
                            <option value="Train">🚆 Train</option>
                            <option value="Bus">🚌 Bus</option>
                            <option value="Hotel">🏨 Hotel Stay</option>
                            <option value="Taxi">🚕 Taxi / Uber</option>
                            <option value="Food">🍴 Dining</option>
                        </select>
                        <input type="text" id="t-trip" placeholder="Trip Destination" class="w-full p-3 bg-zinc-50 rounded-xl border border-zinc-200 outline-none text-sm">
                        <input type="text" id="t-ref" placeholder="PNR / Booking ID" class="w-full p-3 bg-zinc-50 rounded-xl border border-zinc-200 outline-none text-sm">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" id="t-amt" required placeholder="Base ₹" class="p-3 bg-zinc-50 rounded-xl border border-zinc-200 outline-none text-sm">
                            <input type="text" id="t-disc" placeholder="Disc (₹ or %)" class="p-3 bg-zinc-50 rounded-xl border border-zinc-200 outline-none text-sm">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-zinc-400 uppercase px-1">Attach Receipt</label>
                            <input type="file" id="t-file" accept="image/*,application/pdf" class="w-full text-xs text-zinc-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-black file:bg-zinc-100 file:text-zinc-700">
                        </div>
                        <input type="date" id="t-date" class="w-full p-3 bg-zinc-50 rounded-xl border border-zinc-200 outline-none text-sm">
                        <button type="submit" class="w-full py-4 bg-emerald-600 text-white font-bold rounded-2xl hover:bg-emerald-700 transition-all uppercase tracking-widest text-[11px]">Save Travel</button>
                    </form>
                </section>
            </div>

            <div class="lg:col-span-7 space-y-6">
                <div class="bg-white rounded-3xl shadow-sm border border-zinc-200 overflow-hidden">
                    <div class="p-5 border-b border-zinc-100 bg-zinc-50/50">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-black text-[10px] uppercase tracking-[0.2em] text-zinc-400" id="hist-title">Utility History</h3>
                            <button onclick="clearCurrentData()" class="text-[10px] font-black text-red-500 hover:bg-red-50 px-3 py-1 rounded-full transition">WIPE ALL</button>
                        </div>
                        <div class="flex gap-2 bg-white p-2 rounded-xl shadow-inner border border-zinc-200 overflow-x-auto">
                            <select id="filter-year" onchange="render()" class="bg-transparent text-[11px] font-black outline-none text-zinc-600 px-2 border-r border-zinc-100"></select>
                            <select id="filter-month" onchange="render()" class="bg-transparent text-[11px] font-black outline-none text-zinc-600 px-2 border-r border-zinc-100">
                                <option value="0">JAN</option><option value="1">FEB</option><option value="2">MAR</option><option value="3">APR</option><option value="4">MAY</option><option value="5">JUN</option><option value="6">JUL</option><option value="7">AUG</option><option value="8">SEP</option><option value="9">OCT</option><option value="10">NOV</option><option value="11">DEC</option>
                            </select>
                            <select id="filter-day" onchange="render()" class="bg-transparent text-[11px] font-black outline-none text-zinc-600 px-2">
                                <option value="all">ALL DAYS</option>
                            </select>
                        </div>
                    </div>
                    <div id="dataList" class="divide-y divide-zinc-100 max-h-[600px] overflow-y-auto custom-scroll"></div>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="import-file" class="hidden" accept=".json">

    <script>
        let uData = JSON.parse(localStorage.getItem('vPro_U')) || [];
        let tData = JSON.parse(localStorage.getItem('vPro_T')) || [];
        let activeTab = 'utility';
        const uCats = ['Mobile', 'Electricity', 'Petrol', 'Gas', 'Broadband'];
        const tCats = ['Flight', 'Train', 'Bus', 'Hotel', 'Taxi', 'Food'];

        function getDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('VaultProDB', 1);
                request.onupgradeneeded = (e) => { e.target.result.createObjectStore('handles'); };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function getStoredHandle(key) {
            try {
                const db = await getDB();
                return new Promise((resolve) => {
                    const tx = db.transaction('handles', 'readonly');
                    const req = tx.objectStore('handles').get(key);
                    req.onsuccess = () => resolve(req.result || null);
                });
            } catch { return null; }
        }

        async function storeHandle(key, handle) {
            try {
                const db = await getDB();
                const tx = db.transaction('handles', 'readwrite');
                tx.objectStore('handles').put(handle, key);
            } catch (e) { console.error("Failed to store file handle", e); }
        }

        function initFilters() {
            const yearSel = document.getElementById('filter-year');
            const daySel = document.getElementById('filter-day');
            const now = new Date();
            for(let i = now.getFullYear() - 2; i <= now.getFullYear() + 2; i++) {
                const opt = new Option(i, i);
                if(i === now.getFullYear()) opt.selected = true;
                yearSel.add(opt);
            }
            for(let i = 1; i <= 31; i++) {
                const opt = new Option(i, i);
                if(i === now.getDate()) opt.selected = true;
                daySel.add(opt);
            }
            document.getElementById('filter-month').value = now.getMonth();
        }

        async function toBase64(file) {
            return new Promise((res, rej) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => res(reader.result);
                reader.onerror = e => rej(e);
            });
        }

        function switchTab(tab) {
            activeTab = tab;
            document.getElementById('pane-utility').classList.toggle('hidden', tab !== 'utility');
            document.getElementById('pane-travel').classList.toggle('hidden', tab !== 'travel');
            document.getElementById('tab-btn-utility').className = tab === 'utility' ? 'flex-1 py-3 rounded-xl font-bold transition-all active-tab text-xs uppercase tracking-wider' : 'flex-1 py-3 rounded-xl font-bold transition-all text-zinc-500 text-xs uppercase tracking-wider';
            document.getElementById('tab-btn-travel').className = tab === 'travel' ? 'flex-1 py-3 rounded-xl font-bold transition-all active-tab text-xs uppercase tracking-wider' : 'flex-1 py-3 rounded-xl font-bold transition-all text-zinc-500 text-xs uppercase tracking-wider';
            document.getElementById('hist-title').innerText = `${tab.toUpperCase()} HISTORY`;
            render();
        }

        function toggleUFields() {
            const cat = document.getElementById('u-cat').value;
            const label = document.getElementById('u-acc-label');
            const accField = document.getElementById('u-acc');

            document.getElementById('u-elec-group').classList.toggle('hidden', cat !== 'Electricity');
            document.getElementById('u-fuel-group').classList.toggle('hidden', !['Petrol', 'Gas'].includes(cat));
            
            if (['Gas', 'Broadband'].includes(cat)) {
                label.innerText = "Account ID";
                label.classList.remove('hidden');
                accField.placeholder = "Enter Account ID";
                if(!document.getElementById('u-id').value) accField.value = "";
            } else if (cat === 'Mobile') {
                label.innerText = "Mobile Number";
                label.classList.remove('hidden');
                accField.placeholder = "Enter Mobile Number";
                if(!document.getElementById('u-id').value) accField.value = "";
            } else if (cat !== 'Electricity') {
                label.classList.add('hidden');
                accField.placeholder = "Account / Phone / Meter No";
                if(!document.getElementById('u-id').value) accField.value = "";
            }

            if(cat !== 'Electricity') {
                document.getElementById('u-blr-fields').classList.add('hidden');
                accField.readOnly = false;
                accField.classList.remove('bg-zinc-200/60', 'text-zinc-600', 'cursor-not-allowed', 'font-semibold');
            } else {
                handleCityChange();
            }
        }

        function calculateBlrBillingPeriod() {
            const now = new Date();
            let currentYear = now.getFullYear();
            let currentMonth = now.getMonth();
            let fromYear = currentYear;
            let fromMonth = currentMonth - 1;
            
            if (fromMonth < 0) {
                fromMonth = 11;
                fromYear = currentYear - 1;
            }
            
            const pad = (n) => n.toString().padStart(2, '0');
            document.getElementById('u-bill-from').value = `${fromYear}-${pad(fromMonth + 1)}-15`;
            document.getElementById('u-bill-to').value = `${currentYear}-${pad(currentMonth + 1)}-15`;
        }

        function handleCityChange() {
            const cat = document.getElementById('u-cat').value;
            const city = document.getElementById('u-city').value;
            const blrPanel = document.getElementById('u-blr-fields');
            const accField = document.getElementById('u-acc');
            const label = document.getElementById('u-acc-label');

            if (cat === 'Electricity' && city === 'Bangalore') {
                label.innerText = "Account ID";
                label.classList.remove('hidden');
                blrPanel.classList.remove('hidden');
                accField.value = "5899612";
                accField.readOnly = true;
                accField.classList.add('bg-zinc-200/60', 'text-zinc-600', 'cursor-not-allowed', 'font-semibold');
                if(!document.getElementById('u-id').value) calculateBlrBillingPeriod();
            } else {
                blrPanel.classList.add('hidden');
                accField.readOnly = false;
                accField.classList.remove('bg-zinc-200/60', 'text-zinc-600', 'cursor-not-allowed', 'font-semibold');
                if (cat === 'Electricity') {
                    label.innerText = "Account ID";
                    label.classList.remove('hidden');
                    accField.placeholder = "Enter Account / Meter ID";
                }
                if(!document.getElementById('u-id').value) {
                    accField.value = "";
                    document.getElementById('u-bill-from').value = "";
                    document.getElementById('u-bill-to').value = "";
                } 
            }
        }

        function copyText(t) {
            if (!t || t === 'NA') return;
            navigator.clipboard.writeText(t).then(() => {
                const toast = document.createElement('div');
                toast.className = 'bg-zinc-900 text-white px-4 py-2 rounded-2xl text-[10px] font-black shadow-xl mb-2 copy-toast border border-zinc-700';
                toast.innerText = `COPIED: ${t}`;
                document.getElementById('toast-container').appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            });
        }

        function getNet(base, dStr) {
            let d = 0;
            if (dStr && dStr.toString().includes('%')) d = (base * parseFloat(dStr)) / 100;
            else d = parseFloat(dStr) || 0;
            return { net: base - d, disc: d };
        }

        document.getElementById('uForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('u-id').value;
            const base = parseFloat(document.getElementById('u-amt').value);
            const fileInput = document.getElementById('u-file');
            let inv = null;
            if(fileInput.files[0]) inv = await toBase64(fileInput.files[0]);
            else if(id) inv = uData.find(x => x.id == id)?.invoice;

            const {net, disc} = getNet(base, document.getElementById('u-disc').value);
            const cat = document.getElementById('u-cat').value;
            const city = document.getElementById('u-city').value;
            let subsidy = (cat === 'Electricity' && city === 'Bangalore') ? (document.getElementById('u-blr-subsidy').value || 0) : null;

            const entry = { 
                id: id ? parseInt(id) : Date.now(), cat, acc: document.getElementById('u-acc').value || 'NA', 
                base, disc, net, date: document.getElementById('u-date').value, 
                billFrom: document.getElementById('u-bill-from').value, billTo: document.getElementById('u-bill-to').value,
                units: document.getElementById('u-units').value, liters: document.getElementById('u-liters').value, 
                city, subsidy, invoice: inv 
            };
            
            if(id) uData = uData.map(x => x.id === entry.id ? entry : x);
            else uData.push(entry);
            saveToStorage('utility');
            resetForm('u');
        });

        document.getElementById('tForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('t-id').value;
            const base = parseFloat(document.getElementById('t-amt').value);
            const fileInput = document.getElementById('t-file');
            let inv = null;
            if(fileInput.files[0]) inv = await toBase64(fileInput.files[0]);
            else if(id) inv = tData.find(x => x.id == id)?.invoice;

            const {net, disc} = getNet(base, document.getElementById('t-disc').value);
            const entry = { id: id ? parseInt(id) : Date.now(), cat: document.getElementById('t-cat').value, trip: document.getElementById('t-trip').value, ref: document.getElementById('t-ref').value || 'NA', base, disc, net, date: document.getElementById('t-date').value, invoice: inv };
            if(id) tData = tData.map(x => x.id === entry.id ? entry : x);
            else tData.push(entry);
            saveToStorage('travel');
            resetForm('t');
        });

        function saveToStorage(type) {
            if(type === 'utility') localStorage.setItem('vPro_U', JSON.stringify(uData));
            else localStorage.setItem('vPro_T', JSON.stringify(tData));
            render();
            autoSyncFile(type);
        }

        // --- INTELLIGENT DEEP MERGE STRATEGY Engine ---
        function mergeDatasets(localData, diskData) {
            const mergedMap = new Map();
            // Process old/existing backup data profile configurations first
            if (Array.isArray(diskData)) {
                diskData.forEach(item => { if(item && item.id) mergedMap.set(item.id, item); });
            }
            // Process current layout runtime mutations. Overwrites or appends perfectly.
            localData.forEach(item => {
                if(item && item.id) {
                    if (mergedMap.has(item.id)) {
                        const existing = mergedMap.get(item.id);
                        // Prevent loss of attachments if the runtime entity dropped reference
                        if (!item.invoice && existing.invoice) {
                            item.invoice = existing.invoice;
                        }
                    }
                    mergedMap.set(item.id, item);
                }
            });
            return Array.from(mergedMap.values()).sort((a,b) => a.id - b.id);
        }

        // Core Pipeline for targeted execution paths
        async function handleManualExport(type) {
            let handle = await getStoredHandle(`handle_${type}`);
            const defaultName = `vault_${type}_backup.json`;
            
            if ('showSaveFilePicker' in window) {
                if (!handle) {
                    try {
                        handle = await window.showSaveFilePicker({
                            suggestedName: defaultName,
                            types: [{ description: 'JSON Database Backup File', accept: { 'application/json': ['.json'] } }],
                        });
                        await storeHandle(`handle_${type}`, handle);
                    } catch (err) {
                        if (err.name === 'AbortError') return;
                    }
                }
                
                if (handle) {
                    try {
                        const opts = { mode: 'readwrite' };
                        if ((await handle.queryPermission(opts)) !== 'granted') {
                            if ((await handle.requestPermission(opts)) !== 'granted') return;
                        }
                        
                        // Read and parse disk data safely prior to merging
                        let diskData = [];
                        try {
                            const file = await handle.getFile();
                            const contents = await file.text();
                            if(contents.trim()) diskData = JSON.parse(contents);
                        } catch(e) { console.warn("Could not parse existing target file layers. Initializing clean rewrite."); }

                        const localData = type === 'utility' ? uData : tData;
                        const finalMergedDataset = mergeDatasets(localData, diskData);
                        
                        // Sync localized instance state matching deep layout checks
                        if(type === 'utility') { uData = finalMergedDataset; localStorage.setItem('vPro_U', JSON.stringify(uData)); }
                        else { tData = finalMergedDataset; localStorage.setItem('vPro_T', JSON.stringify(tData)); }
                        render();

                        const blob = new Blob([JSON.stringify(finalMergedDataset, null, 2)], { type: 'application/json' });
                        const writable = await handle.createWritable();
                        await writable.write(blob);
                        await writable.close();
                        showSimpleToast('DATA DUPLICATE-CHECKED & SYNCED');
                        return;
                    } catch (err) {
                        console.error("Direct storage pipeline faulted, falling back.", err);
                    }
                }
            }
            
            // Legacy standard download implementation fallback paths
            const fallbackData = type === 'utility' ? uData : tData;
            const blob = new Blob([JSON.stringify(fallbackData, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = defaultName;
            a.click();
            URL.revokeObjectURL(a.href);
            showSimpleToast('DOWNLOAD STARTED');
        }

        async function autoSyncFile(type) {
            if ('showSaveFilePicker' in window) {
                const handle = await getStoredHandle(`handle_${type}`);
                if (handle && (await handle.queryPermission({ mode: 'readwrite' })) === 'granted') {
                    try {
                        let diskData = [];
                        try {
                            const file = await handle.getFile();
                            const contents = await file.text();
                            if(contents.trim()) diskData = JSON.parse(contents);
                        } catch(e){}

                        const localData = type === 'utility' ? uData : tData;
                        const finalMergedDataset = mergeDatasets(localData, diskData);

                        const blob = new Blob([JSON.stringify(finalMergedDataset, null, 2)], { type: 'application/json' });
                        const writable = await handle.createWritable();
                        await writable.write(blob);
                        await writable.close();
                    } catch (e) { console.error("Auto backup sync failed", e); }
                }
            }
        }

        function viewFile(d) {
            const w = window.open();
            w.document.write(`<iframe src="${d}" frameborder="0" style="width:100%; height:100%;" allowfullscreen></iframe>`);
        }

        function render() {
            const list = document.getElementById('dataList');
            let data = activeTab === 'utility' ? uData : tData;
            renderSummary();

            const fY = parseInt(document.getElementById('filter-year').value);
            const fM = parseInt(document.getElementById('filter-month').value);
            const fD = document.getElementById('filter-day').value;

            data = data.filter(i => {
                const d = new Date(i.date);
                return d.getFullYear() === fY && d.getMonth() === fM && (fD === 'all' || d.getDate() === parseInt(fD));
            });
            
            list.innerHTML = data.slice().reverse().map(item => {
                const cVal = activeTab === 'utility' ? item.acc : item.ref;
                let periodText = "";
                if (activeTab === 'utility' && item.billFrom && item.billTo) {
                    const fmt = (dStr) => dStr.split('-').reverse().join('/');
                    periodText = ` &bull; Period: ${fmt(item.billFrom)} to ${fmt(item.billTo)}`;
                }
                return `
                <div class="p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center group hover:bg-zinc-50 transition gap-4">
                    <div class="flex items-center gap-3">
                        <div class="p-2 bg-zinc-100 text-zinc-900 rounded-lg text-[10px] font-black border border-zinc-200">${item.cat.substring(0,2).toUpperCase()}</div>
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-sm text-zinc-900">${item.cat} ${item.city ? '<span class="text-indigo-600">('+item.city+')</span>' : ''}</span>
                                <div onclick="copyText('${cVal}')" class="px-2 py-0.5 bg-zinc-100 rounded text-[9px] text-zinc-500 font-bold cursor-pointer">#${cVal}</div>
                            </div>
                            <div class="text-[10px] text-zinc-400 font-bold mt-0.5 uppercase tracking-wider">${item.date} ${item.trip ? '• '+item.trip : ''} ${periodText}</div>
                            ${item.subsidy ? `<div class="text-[9px] text-indigo-500 font-bold mt-0.5">Subsidy: ₹${item.subsidy}</div>` : ''}
                            ${item.invoice ? `<button onclick="viewFile('${item.invoice}')" class="mt-2 text-[9px] font-black text-indigo-600 bg-indigo-50 px-2 py-1 rounded-xl uppercase transition hover:bg-indigo-100">View Copy</button>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center justify-between w-full sm:w-auto gap-4">
                        <div class="text-left sm:text-right">
                            <div class="text-[9px] text-zinc-400 font-bold">Base: ₹${item.base.toLocaleString('en-IN')}</div>
                            ${item.disc > 0 ? `<div class="text-[9px] text-emerald-600 font-black">Disc: -₹${item.disc.toFixed(0)}</div>` : ''}
                            <div class="font-black text-zinc-900 text-lg leading-tight">₹${item.net.toLocaleString('en-IN')}</div>
                        </div>
                        <div class="flex gap-2 sm:opacity-0 group-hover:opacity-100 transition">
                            <button onclick="editItem(${item.id})" class="text-indigo-600 text-[10px] font-black uppercase">Edit</button>
                            <button onclick="deleteItem(${item.id})" class="text-red-300 text-sm">✕</button>
                        </div>
                    </div>
                </div>
                `}).join('') || '<div class="p-20 text-center text-zinc-300 font-black text-[10px] uppercase">No Records</div>';
        }

        function renderSummary() {
            const grid = document.getElementById('summary-grid');
            const data = activeTab === 'utility' ? uData : tData;
            const now = new Date();
            let cats = [];
            if (activeTab === 'utility') {
                uCats.forEach(c => {
                    if (c === 'Electricity') {
                        const cities = [...new Set(data.filter(d => d.cat === 'Electricity').map(d => d.city || 'General'))];
                        if (cities.length === 0) cats.push({ c: 'Electricity', city: '' });
                        else cities.forEach(city => cats.push({ c: 'Electricity', city }));
                    } else cats.push({ c, city: null });
                });
            } else tCats.forEach(c => cats.push({ c, city: null }));

            grid.innerHTML = cats.map(item => {
                const entries = data.filter(d => d.cat === item.c && (item.city === null || (d.city || 'General') === item.city));
                const mT = entries.filter(d => { const dt = new Date(d.date); return dt.getMonth() === now.getMonth() && dt.getFullYear() === now.getFullYear(); }).reduce((s, c) => s + c.net, 0);
                const yT = entries.filter(d => new Date(d.date).getFullYear() === now.getFullYear()).reduce((s, c) => s + c.net, 0);
                return `
                <div class="bg-white p-4 rounded-2xl border border-zinc-200 shadow-sm">
                    <div class="text-[9px] font-black text-zinc-400 uppercase mb-2 tracking-widest">${item.city ? item.city : item.c}</div>
                    <div class="text-sm font-black text-zinc-900">M: ₹${Math.round(mT).toLocaleString('en-IN')}</div>
                    <div class="text-[8px] text-zinc-400 font-black uppercase mt-1">Y: ₹${Math.round(yT).toLocaleString('en-IN')}</div>
                </div>
                `;
            }).join('');
        }

        function editItem(id) {
            const data = activeTab === 'utility' ? uData : tData;
            const i = data.find(x => x.id === id);
            if(activeTab === 'utility') {
                document.getElementById('u-id').value = i.id;
                document.getElementById('u-cat').value = i.cat;
                document.getElementById('u-acc').value = i.acc;
                document.getElementById('u-bill-from').value = i.billFrom || '';
                document.getElementById('u-bill-to').value = i.billTo || '';
                document.getElementById('u-amt').value = i.base;
                document.getElementById('u-disc').value = i.disc;
                document.getElementById('u-date').value = i.date;
                document.getElementById('u-units').value = i.units || '';
                document.getElementById('u-liters').value = i.liters || '';
                document.getElementById('u-city').value = i.city || '';
                document.getElementById('pane-utility').classList.add('edit-glow');
                toggleUFields();
                if(i.city === 'Bangalore') document.getElementById('u-blr-subsidy').value = i.subsidy || '';
            } else {
                document.getElementById('t-id').value = i.id;
                document.getElementById('t-cat').value = i.cat;
                document.getElementById('t-trip').value = i.trip;
                document.getElementById('t-ref').value = i.ref;
                document.getElementById('t-amt').value = i.base;
                document.getElementById('t-disc').value = i.disc;
                document.getElementById('t-date').value = i.date;
                document.getElementById('pane-travel').classList.add('edit-glow');
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteItem(id) {
            if(!confirm('DELETE?')) return;
            if(activeTab === 'utility') uData = uData.filter(x => x.id !== id);
            else tData = tData.filter(x => x.id !== id);
            saveToStorage(activeTab);
        }

        function showSimpleToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'bg-emerald-600 text-white px-4 py-2 rounded-2xl text-[10px] font-black shadow-xl mb-2 copy-toast border border-emerald-500';
            toast.innerText = msg;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function triggerImport(type) {
            const input = document.getElementById('import-file');
            input.dataset.targetType = type;
            input.click();
        }

        document.getElementById('import-file').onchange = (e) => {
            const type = e.target.dataset.targetType;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const parsed = JSON.parse(ev.target.result);
                    if (type === 'utility') { uData = parsed; localStorage.setItem('vPro_U', JSON.stringify(uData)); }
                    else { tData = parsed; localStorage.setItem('vPro_T', JSON.stringify(tData)); }
                    render();
                    showSimpleToast('DATA IMPORTED');
                } catch(e) { alert('Invalid file format'); }
            };
            reader.readAsText(e.target.files[0]);
        };

        function resetForm(p) {
            document.getElementById(`${p}Form`).reset();
            document.getElementById(`${p}-id`).value = '';
            document.getElementById(`pane-${p === 'u' ? 'utility' : 'travel'}`).classList.remove('edit-glow');
            document.getElementById(`${p}-date`).valueAsDate = new Date();
            if(p === 'u') {
                document.getElementById('u-acc').readOnly = false;
                document.getElementById('u-acc').classList.remove('bg-zinc-200/60', 'text-zinc-600', 'cursor-not-allowed', 'font-semibold');
                document.getElementById('u-blr-fields').classList.add('hidden');
                document.getElementById('u-acc-label').classList.add('hidden');
            }
        }

        function clearCurrentData() {
            if(confirm('WIPE DATA?')) {
                if(activeTab === 'utility') uData = []; else tData = [];
                saveToStorage(activeTab);
            }
        }

        initFilters();
        document.getElementById('u-date').valueAsDate = new Date();
        document.getElementById('t-date').valueAsDate = new Date();
        toggleUFields();
        render();
    </script>
</body>
</html>
